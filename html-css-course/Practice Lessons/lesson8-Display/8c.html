<!DOCTYPE html>
<html>
    <head>
        <title>Text Box Example-3</title>
        <style>
            .google{
                width: 200px;
                margin-left: 500px;
                display: block;
            }

            .textbox{
                width: 400px;
                padding-top: 7px;
                padding-bottom: 7px;
                border: none;
                height: 20px;
                border-radius: 16px;
                padding-left: 10px;
                box-shadow: 0px 5px 3px rgba(0,0,0,0.05);
                vertical-align: middle;
                margin-left: 400px;
                margin-top: 10px;
            }
        </style>
    </head>
    <body>
        <img class="google" src="google-logo.png">
        <input class="textbox" type="text" placeholder="Search Google or type a URL">
    </body>
</html>
