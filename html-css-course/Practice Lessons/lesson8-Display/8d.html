<!DOCTYPE html>
<html>

<head>
    <title>Sign Up Form</title>
    <style>

        input{
            padding-left: 10px;
            font-family: Arial, Helvetica, sans-serif;
            height: 32px;
            width: 100px;
            border-radius: 10px;
            border-style: solid;
            border-width: 1px;
        }
        .firstname {
            height: 32px;
        }

        .lastname {
            width: 100px;
        }

        .email {
            display: block;
            width: 216px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .signup-button {
            font-size: 16px;
            color: white;
            width: 230px;
            border: none;
            background-color: rgb(56, 56, 237);
            height: 40px;
            cursor: pointer;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <input class="firstname" type="text" placeholder="First name">
    <input class="lastname" type="text" placeholder="Last name">
    <input class="email" type="text" placeholder="Email">
    <button class="signup-button">Sing Up</button>
</body>

</html>
