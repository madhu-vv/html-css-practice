<!DOCTYPE html>
<html>
    <head>
        <title>Nested Layouts Example-4</title>
        <style>
            p{
                font-family: Arial, Helvetica, sans-serif;
                margin-top: 0;
                margin-bottom: 0;
            }
            .cat-image{
                width: 140px;
                height: 120px;
            }
            .cat-name{
                font-weight: bold;
                font-size: 18px;
                margin-top: 5px;
                margin-left: 8px;
            }

            .facebook{
                box-shadow: 2px 2px 2px rgba(0,0,0,0.1);
                margin-left: 10px;
                width: 140px;
                display: inline-block;
            }

            .dog-preview{
                margin-left: 8px;
                margin-bottom: 5px;
                margin-top: 5px;
            }

            .dog-image{
                width: 26px;
                height: 26px;
                border-radius: 26px;
                object-fit: cover; 
                vertical-align: middle;
            }
            
            .mutual-friends{
                display: inline-block;
                font-size: 12px;
                color: rgb(96, 96, 96);
            }

            .add-friend-button{
                background-color: rgb(78, 78, 229);
                border: none;
                color: white;
                font-size: 14px;
                border-radius: 4px;
                padding: 8px;
                padding-left: 16px;
                padding-right: 16px;
                margin-top: 5px;
                margin-left: 8px;
                margin-bottom: 8px;
            }
        </style>
    </head>
    <body>
        <div class="facebook">
        <img class="cat-image" src="cat1.jpg">
        <p class="cat-name">Oliver</p>
        <div class="dog-preview">
        <img class="dog-image" src="dog2.jpg">
        <p class="mutual-friends">2 mutual friends</p>
        </div>
        <button class="add-friend-button">Add Friend</button>
        </div>

        <div class="facebook">
        <img class="cat-image" src="cat2.jpg">
        <p class="cat-name">Oliver</p>
        <div class="dog-preview">
        <img class="dog-image" src="dog2.jpg">
        <p class="mutual-friends">3 mutual friends</p>
        </div>
        <button class="add-friend-button">Add Friend</button>
        </div>

        <div class="facebook">
        <img class="cat-image" src="dog.jpg">
        <p class="cat-name">Oliver</p>
        <div class="dog-preview">
        <img class="dog-image" src="dog2.jpg">
        <p class="mutual-friends">4 mutual friends</p>
        </div>
        <button class="add-friend-button">Add Friend</button>
        </div>
    </body>
</html>
