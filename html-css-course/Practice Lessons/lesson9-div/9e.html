<!DOCTYPE html>
<html>
    <head>
        <title>The Div Example-5</title>
        <style>
            .cat-image{
                width: 46px;
                height: 46px;
                object-fit: cover;
                border-radius: 25px;
                vertical-align: middle;
            }

            .textbox{
                width: 250px;
                height: 30px;
                font-size: 16px;
                border-style: solid;
                border-radius: 18px;
                padding-left: 6px;
                vertical-align:middle;
                border: none;
            }

            .tweet-button{
                font-family: Arial, Helvetica, sans-serif;
                color: white;
                border: none;
                font-size: 14px;
                background-color: rgb(29, 155, 240);
                height: 24px;
                width: 70px;
                border-radius: 12px;
                vertical-align: middle;
                cursor: pointer;
            }

            .div-example{
                width: 450px;
                padding: 8px;
                border-radius: 4px;
                box-shadow: 0 0 6px rgba(0,0,0,0.1);
            }
        </style>
    </head>
    <body>
        <div class="div-example">
        <img class="cat-image" src="cat1.jpg">
        <input class="textbox" type="text" placeholder="What's happening?">
        <button class="tweet-button">Tweet</button>
        </div>
    </body>
</html>
