<!DOCTYPE html>
<html>

<head>
    <title>The Div Example-6</title>
    <style>
        .div-example {
            display: inline-block;
            box-shadow: 0 0 3px rgba(0,0,0,0.2);
            margin-left: 8px;
        }

        .cat-image {
            width: 130px;
            height: 130px;
            margin-bottom: 6px;
        }

        .name {
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .friends {
            color: gray;
            font-size: 14px;
            margin-top: 6px;
            margin-bottom: 0;
            padding-left: 4px;
        }

        .friend-button {
            background-color: rgb(75, 75, 189);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            padding: 6px;
            padding-left: 14px;
            padding-right: 14px;
            margin-top: 8px;
            margin-bottom: 6px;
            margin-left: 4px;
        }
    </style>
</head>

<body>
    <div class="div-example">
        <img class="cat-image" src="cat1.jpg">
        <p class="name">Oliver</p>
        <p class="friends">2 mutual friends</p>
        <button class="friend-button">Add Friend</button>
    </div>

    
</body>

</html>
