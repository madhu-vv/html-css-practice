<!DOCTYPE html>
<html>
    <head>
        <title>The Div Example-4</title>
        <style>
            .div-example{
                background-color: black;
                width: 330px;
                padding-left: 10px;
                padding-top: 2px;
                padding-bottom: 2px;
                padding-right: 10px;
            }
            .heading{
                color: white;
                font-family: Arial, Helvetica, sans-serif;
                font-weight: bold;
            }
            .description{
                color: gray;
            }
        </style>
    </head>
    <body>
        <div class="div-example">
        <p class="heading">Install YouTube Music</p>
        <p class="description">Add YouTube Music to your desktop for quick and easy access</p>
        </div>
    </body>
</html>
