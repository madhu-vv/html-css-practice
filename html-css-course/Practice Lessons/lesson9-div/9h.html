<!DOCTYPE html>
<html>
    <head>
        <title>The Div Example-8</title>
        <style>
            div{
                text-align: center;
            }
        
            img{
                width: 200px;
                margin-top: 10px;
                margin-bottom: 10px;
            }

            input{
                width: 500px;
                padding-top: 12px;
                padding-bottom: 12px;
                font-size: 16px;
                border: none;
                border-radius: 30px;
                padding-left: 16px;
                padding-right: 16px;
                box-shadow: 0px 1px 6px rgba(0,0,0,0.2);
                margin-bottom: 30px;
            }

            .button{
                background-color: rgb(240, 239, 239);
                border: none;
                font-size: 15px;
                padding-top: 12px;
                padding-bottom: 12px;
                font-weight: bold;
                padding-left: 20px;
                padding-right: 20px;
            }

        </style>
    </head>
    <body>
        <div>
        <img class="google" src="google-logo.png">
        </div>
        <div>
        <input class="textbox" type="text" placeholder="Search Google or type a URL">
        </div>
        <div>
        <button class="button">Google Search</button>
        <button class="button">I'm Feeling Lucky</button>
        </div>
        
    </body>
</html>
