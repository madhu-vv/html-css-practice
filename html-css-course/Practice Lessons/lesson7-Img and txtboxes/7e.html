<!DOCTYPE html>
<html>
    <head>
        <title>Text Box Example2</title>
        <style>
            .text-example2{
                width: 390px;
                border: none;
                padding: 10px;
                border-radius: 18px;
                border-width: 1px;
                font-size: 14px;
                box-shadow: 0px 5px 5px rgba(0,0,0,0.1);
            }
        </style>
    </head>
    <body>
        <input class="text-example2" type="text" placeholder="Search Google or type a URL">
    </body>
</html>
