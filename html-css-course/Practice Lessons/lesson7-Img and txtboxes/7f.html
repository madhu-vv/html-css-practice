<!DOCTYPE html>
<html>
    <head>
        <title>Text Box Examplef</title>
        <style>
            .email{
                font-family: Arial, Helvetica, sans-serif;
                font-size: 14px;
                margin-bottom: 0;
            }

            .email-text{
                font-size: 14px;
                width: 400px;
                border-radius: 4px;
                border-style: solid;
                border-width: 2px;
                height: 22px;
                margin-top: 4px;
                margin-bottom: 0;
            }

            .agreement{
                font-family: Arial, Helvetica, sans-serif;
                font-size: 14px;
                margin-top: 12px;
                margin-bottom: 0;
            }

            .agree-button{
                font-family: Arial, Helvetica, sans-serif;
                background-color: rgb(10, 102, 194);
                font-size: 20px;
                border: none;
                padding-bottom: 16px;
                padding-top: 16px;
                width: 400px;
                color: white;
                border-radius: 20px;
                cursor: pointer;
                margin-top: 12px;
            }
        </style>
    </head>
    <body>
        <p class="email">Email</p>
        <input class="email-text" type="text">
        <p class="agreement">By clicking Agree & Join, you agree to the Privacy Policy.</p>
        <button class="agree-button">Agree & Join</button>
    </body>
</html>
