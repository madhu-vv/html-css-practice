<!DOCTYPE html>
<html>
    <head>
        <title>Twitter Text Box</title>
        <style>
            .cat-image{
                width: 46px;
                height: 46px;
                border-radius: 25px;
                vertical-align: middle;
            }

            .textbox{
                width: 250px;
                height: 30px;
                font-size: 16px;
                border-style: solid;
                border-radius: 18px;
                padding-left: 6px;
                vertical-align:middle;
                border: none;
            }

            .tweet-button{
                font-family: Arial, Helvetica, sans-serif;
                color: white;
                border: none;
                font-size: 14px;
                background-color: rgb(64, 64, 209);
                height: 24px;
                width: 70px;
                border-radius: 12px;
                vertical-align: middle;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <img class="cat-image" src="cat1.jpg">
        <input class="textbox" type="text" placeholder="What's happening?">
        <button class="tweet-button">Tweet</button>
    </body>
</html>
